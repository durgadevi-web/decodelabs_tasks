<h2>AI Career Recommendation Quiz</h2>

<div class="card" style="max-width:700px;margin:auto;text-align:left;">

<label><b>1. Which subject do you enjoy the most?</b></label>

<select id="subject" style="width:100%;padding:12px;margin-top:10px;margin-bottom:25px;">

<option value="programming">Programming</option>

<option value="math">Mathematics</option>

<option value="design">Design</option>

<option value="network">Networking</option>

</select>

<label><b>2. What do you like doing?</b></label>

<select id="interest" style="width:100%;padding:12px;margin-top:10px;margin-bottom:25px;">

<option value="">Select</option>

<option value="coding">Writing Code</option>

<option value="analysis">Analyzing Data</option>

<option value="creative">Creating Designs</option>

<option value="servers">Managing Servers</option>

</select>

<label><b>3. What is your dream job?</b></label>

<select id="goal" style="width:100%;padding:12px;margin-top:10px;margin-bottom:25px;">

<option value="">Select</option>

<option value="ai">AI Engineer</option>

<option value="data">Data Scientist</option>

<option value="cloud">Cloud Engineer</option>

<option value="web">Web Developer</option>

</select>

<center>

<button onclick="recommendCareer()" class="btn">

Get Recommendation

</button>
